name: openrouter-models-eval
description: |
  Evaluation suite for the openrouter-models skill. Validates that the agent
  picks the correct script (list-models / search-models / resolve-model /
  compare-models / get-endpoints) and invokes it with the correct flags, then
  formats the result per the skill's "Presenting Results" guidance.

  Graders are PER-TASK (task-level graders are additive).
skill: openrouter-models
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-opus-4.7
  # Force the agent to load the worktree copy of this skill, not whatever
  # stale copy lives in ~/.claude/skills/ from a prior plugin install.
  skill_directories:
    - "skills"
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Did the agent pick the right script and produce a skill-faithful answer?

# Sync each skill into ~/.agents/skills/ (and npm-install its bundled scripts)
# before any tasks run. prepare-skill.ts is a single shell-less command — waza
# runs hook `command:` entries WITHOUT a shell, so `cd && cmd` chaining fails.
# Sync both skills the agent may route to: the models skill itself, and
# openrouter-typescript-sdk (which carries the cross-skill cue pointing here).
hooks:
  before_run:
    - command: "bun evals/_hooks/prepare-skill.ts openrouter-models"
    - command: "bun evals/_hooks/prepare-skill.ts openrouter-typescript-sdk"

graders:
  # Universal: non-empty response.
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 50"

tasks:
  - "tasks/*.yaml"
